name: mobile_app
publish_to: none
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.8.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.1

  # Persistence
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5

  # Code generation annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Internal packages
  fmf_core:
    path: ../../packages/core
  fmf_design_system:
    path: ../../packages/design_system
  fmf_domain:
    path: ../../packages/domain
  fmf_data:
    path: ../../packages/data

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
  generate: true
