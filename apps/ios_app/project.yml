name: FMF
options:
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.0.0

targets:
  FMF:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: "com.fmf.app$(BUNDLE_ID_SUFFIX)"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
        PRODUCT_NAME: "FMF"
      configs:
        Debug:
          XCCONFIG_FILE: Configurations/dev.xcconfig
        Release:
          XCCONFIG_FILE: Configurations/prod.xcconfig
    configFiles:
      Debug: Configurations/dev.xcconfig
      Release: Configurations/prod.xcconfig
    dependencies:
      - package: GRDB
    scheme:
      testTargets:
        - FMFTests

  FMFTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FMF
      - package: GRDB

schemes:
  FMF-Dev:
    build:
      targets:
        FMF: all
    run:
      config: Debug
      environmentVariables:
        APP_FLAVOR: dev
    test:
      config: Debug
      targets:
        - FMFTests
  FMF-Prod:
    build:
      targets:
        FMF: all
    run:
      config: Release
    archive:
      config: Release
