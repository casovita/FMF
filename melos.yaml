name: fitness_monster_factory
repository: https://github.com/casovita/FMF
sdkPath: auto

packages:
  - apps/**
  - packages/**

scripts:
  analyze:
    run: melos exec --concurrency=4 -- "flutter analyze ."
    description: Run flutter analyze on all packages

  format:
    run: dart format . --line-length 120
    description: Format all Dart code

  format:check:
    run: dart format . --line-length 120 --set-exit-if-changed
    description: Check formatting (CI)

  test:
    run: melos exec --concurrency=4 -- "flutter test"
    description: Run all tests

  codegen:
    run: melos exec --concurrency=1 -- "dart run build_runner build --delete-conflicting-outputs"
    description: Run code generation on all packages

  codegen:watch:
    run: melos exec --concurrency=1 -- "dart run build_runner watch --delete-conflicting-outputs"
    description: Watch code generation

  clean:
    run: melos exec -- "flutter clean"
    description: Clean all packages

  get:
    run: melos exec -- "flutter pub get"
    description: Get dependencies for all packages
